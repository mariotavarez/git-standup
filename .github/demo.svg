    <text x="96" y="166" fill="#6e7681">  08:50</text>
    <text x="152" y="166" fill="#e6edf3">  chore: update dependencies</text>

    <text x="18" y="194" fill="#58a6ff" font-weight="bold">~/projects/api-server</text>
    <text x="234" y="194" fill="#6e7681">  (1 commit)</text>
    <text x="28" y="212" fill="#8b949e">f1a2b3c</text>
    <text x="96" y="212" fill="#6e7681">  11:30</text>
    <text x="152" y="212" fill="#e6edf3">  fix: rate limiting middleware not applying</text>
  </g>

  <!-- repo 3 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0;0;1;1;0" keyTimes="0;0.10;0.50;0.58;0.62;0.66;0.70;0.95;1" dur="10s" repeatCount="indefinite"/>
    <text x="18" y="66" fill="#3fb950">$</text>
