    <text x="152" y="275" fill="#e6edf3">  refactor: extract chart components</text>

    <!-- Summary -->
    <text x="18" y="310" fill="#3fb950" font-weight="bold">6 commits across 3 repositories</text>

    <!-- Next prompt -->
    <text x="18" y="336" fill="#3fb950">$</text>
    <rect x="30" y="324" width="8" height="14" fill="#e6edf3">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="0.9s" repeatCount="indefinite"/>
