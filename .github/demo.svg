<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <style>
      text { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace; font-size: 13px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="800" height="38" rx="10" fill="#161b22"/>
  <rect y="19" width="800" height="19" fill="#161b22"/>
  <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="19" r="6" fill="#febc2e"/>
  <circle cx="62" cy="19" r="6" fill="#28c840"/>
  <text x="400" y="23" fill="#8b949e" text-anchor="middle" dominant-baseline="middle" font-size="11">zsh — git-standup</text>

  <!-- ── Step 1: command typed ─────────────────────────────── -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.95;1" dur="10s" repeatCount="indefinite"/>

    <!-- prompt -->
    <text x="18" y="66" fill="#3fb950">$</text>
    <text x="30" y="66" fill="#e6edf3"> npx git-standup --since=yesterday</text>
    <!-- blinking cursor after command -->
    <rect x="356" y="54" width="8" height="14" fill="#e6edf3">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ── Step 2: searching message ────────────────────────── -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.06;0.10;0.95;1" dur="10s" repeatCount="indefinite"/>
    <text x="18" y="66" fill="#3fb950">$</text>
    <text x="30" y="66" fill="#e6edf3"> npx git-standup --since=yesterday</text>
    <text x="18" y="86" fill="#6e7681">Searching for git repos in ~/...</text>
  </g>

  <!-- ── Step 3: results appear ───────────────────────────── -->
  <!-- repo 1 header -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.10;0.18;0.22;0.95;1" dur="10s" repeatCount="indefinite"/>
    <text x="18" y="66" fill="#3fb950">$</text>
    <text x="30" y="66" fill="#e6edf3"> npx git-standup --since=yesterday</text>
    <text x="18" y="86" fill="#6e7681">Searching for git repos in ~/...</text>

    <text x="18" y="114" fill="#58a6ff" font-weight="bold">~/projects/invoice-gen</text>
    <text x="246" y="114" fill="#6e7681">  (3 commits)</text>
  </g>

  <!-- repo 1 commits -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.10;0.22;0.30;0.34;0.95;1" dur="10s" repeatCount="indefinite"/>
    <text x="18" y="66" fill="#3fb950">$</text>
    <text x="30" y="66" fill="#e6edf3"> npx git-standup --since=yesterday</text>
    <text x="18" y="86" fill="#6e7681">Searching for git repos in ~/...</text>

    <text x="18" y="114" fill="#58a6ff" font-weight="bold">~/projects/invoice-gen</text>
    <text x="246" y="114" fill="#6e7681">  (3 commits)</text>

    <text x="28" y="132" fill="#8b949e">a1b2c3d</text>
    <text x="96" y="132" fill="#6e7681">  10:42</text>
    <text x="152" y="132" fill="#e6edf3">  feat: add PDF export route</text>

    <text x="28" y="149" fill="#8b949e">d4e5f6a</text>
    <text x="96" y="149" fill="#6e7681">  09:15</text>
    <text x="152" y="149" fill="#e6edf3">  fix: line items total calculation</text>

    <text x="28" y="166" fill="#8b949e">b7c8d9e</text>
    <text x="96" y="166" fill="#6e7681">  08:50</text>
    <text x="152" y="166" fill="#e6edf3">  chore: update dependencies</text>
  </g>

